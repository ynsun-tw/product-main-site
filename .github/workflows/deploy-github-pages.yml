# 构建静态站点并部署到 GitHub Pages（需先在仓库 Settings → Pages 中选择 GitHub Actions 作为来源）
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: 计算子路径 basePath
        id: base
        shell: bash
        run: |
          NAME="${{ github.event.repository.name }}"
          if [[ "$NAME" == *.github.io ]]; then
            echo "使用用户/组织站点根路径（无 basePath）"
            echo "path=" >> "$GITHUB_OUTPUT"
          else
            echo "使用项目页路径：/$NAME"
            echo "path=/$NAME" >> "$GITHUB_OUTPUT"
          fi

      - run: npm ci
      - run: npm run build
        env:
          BASE_PATH: ${{ steps.base.outputs.path }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
